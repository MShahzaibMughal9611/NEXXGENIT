}

#c2 {
	transform: scale(0);
	opacity: 0;
	transform-origin: 50% 50%;
	animation: pulse 4s 0.75s cubic-bezier(.5,.5,0,1) infinite;
}

#c3 {
	transform: scale(0);
	opacity: 0;
	transform-origin: 50% 50%;
	animation: pulse 4s 1.5s cubic-bezier(.5,.5,0,1) infinite;
}

@keyframes pulse {
	
	12% {
		opacity: 0.3;
	}
	
	50% {
		transform: scale(1);
	}
	
	100% {
		transform: scale(1);
	}
	
}
